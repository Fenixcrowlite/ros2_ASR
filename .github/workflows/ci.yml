name: ci

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup environment
        run: make setup
      - name: Ruff
        run: make lint-ruff
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-failure-artifacts
          if-no-files-found: ignore
          path: |
            logs
            artifacts
            .ruff_cache

  mypy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup environment
        run: make setup
      - name: Mypy
        run: make lint-mypy
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-failure-artifacts
          if-no-files-found: ignore
          path: |
            logs
            artifacts
            .mypy_cache

  security-scans:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup environment
        run: make setup
      - name: Bandit
        run: make security-scan
      - name: Secret scan
        run: bash scripts/secret_scan.sh
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-artifacts
          if-no-files-found: ignore
          path: |
            logs
            artifacts

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup environment
        run: make setup
      - name: Unit tests
        run: make test-unit
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-failure-artifacts
          if-no-files-found: ignore
          path: |
            logs
            artifacts
            .pytest_cache

  ros-jazzy-colcon:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Install ROS build tooling and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-colcon-common-extensions python3-rosdep
          if [ ! -e /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            sudo rosdep init
          fi
          rosdep update
          rosdep install --from-paths ros2_ws/src --ignore-src -y --rosdistro jazzy
      - name: Setup environment
        run: make setup
      - name: ROS build (canonical default)
        run: make build
      - name: ROS colcon tests (canonical default)
        run: make test-colcon
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ros-jazzy-colcon-failure-artifacts
          if-no-files-found: ignore
          path: |
            ros2_ws/log
            ros2_ws/build/**/Testing/**/*.xml
            logs
            artifacts

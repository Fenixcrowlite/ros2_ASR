name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff
        run: ruff check .
      - name: Unit tests
        run: PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/ros2_ws/src pytest -m "not cloud and not ros and not e2e and not slow and not legacy" -q

profile_id: benchmark/thesis_extended_cloud_matrix
inherits:
  - default_benchmark
dataset_registry: datasets/registry/datasets_extended.json
dataset_profiles:
  - datasets/librispeech_test_clean_subset
  - datasets/librispeech_test_other_subset
  - datasets/mini_librispeech_dev_clean_2_subset
  - datasets/fleurs_en_us_test_subset
  - datasets/fleurs_fr_fr_test_subset
  - datasets/fleurs_ja_jp_test_subset
  - datasets/fleurs_sk_sk_test_subset
  - datasets/voxpopuli_en_test_subset
  - datasets/voxpopuli_de_test_subset
  - datasets/voxpopuli_es_test_subset
  - datasets/mls_german_test_subset
  - datasets/mls_spanish_test_subset
providers:
  - providers/azure_cloud
  - providers/google_cloud
  - providers/aws_cloud
  - providers/huggingface_api
cloud_cost_control:
  max_samples_per_dataset: 10
  clean_required: true
  noisy_scenarios_optional: true
scenarios:
  - clean
metric_profiles:
  - metrics/default_quality
  - metrics/default_timing
execution_mode: batch
batch:
  max_samples: 10
  timeout_sec: 300
noise:
  mode: white
  levels:
    - clean
  custom_snr_db: []
  seed: 1337

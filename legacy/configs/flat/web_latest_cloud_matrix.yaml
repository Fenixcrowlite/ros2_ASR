# Web GUI scenario: cloud + local matrix for latest model variants.

asr:
  backend: google
  language: en-US
  timeout_sec: 45.0
  sample_rate: 16000
  chunk_ms: 800
  model: ""
  region: ""
  input_mode: file
  wav_path: data/sample/vosk_test.wav

backends:
  mock:
    deterministic_latency_ms: 25.0
  whisper:
    model_size: large-v3
    device: cpu
    compute_type: int8
    condition_on_previous_text: false
    no_speech_threshold: 0.6
    temperature: 0.0
    vad_filter: true
  vosk:
    model_path: ""
  google:
    model: chirp_2
    region: global
  aws:
    region: us-east-1
    s3_bucket: ""
    input_prefix: asr-input/
    output_prefix: asr-output/
    media_format: wav
    cleanup: true
  azure:
    region: eastus
    endpoint: ""

benchmark:
  scenarios:
    - clean
    - snr30
    - snr20
    - snr10
    - snr0
  chunk_sec: 0.8
  output_dir: results
  selected_metrics:
    - wer
    - cer
    - latency_ms
    - rtf
    - cpu_percent
    - ram_mb
    - gpu_util_percent
    - gpu_mem_mb
    - cost_estimate
    - success_rate
  pricing:
    mock: 0.0
    vosk: 0.0
    whisper: 0.0
    google: 0.006
    aws: 0.0004
    azure: 0.016

web:
  scenario_label: "Web: Latest Cloud Matrix"
  scenario_description: "Cross-provider matrix for Google/AWS/Azure with local whisper baseline."
  interfaces:
    - core
    - ros_service
    - ros_action
  model_runs: "google:latest_short@global,google:latest_long@global,google:chirp_2@global,aws:transcribe@us-east-1,azure:speech@eastus,whisper:large-v3"
  benchmark_backends: "whisper,google,aws,azure"
  dataset: "data/transcripts/sample_manifest.csv"
  language_mode: config
  reference_text: "one"
  record_sec: 5.0
  action_chunk_sec: 0.8
  request_timeout_sec: 45.0
  noise_levels: "30,20,10,0"

# Web GUI scenario: quality-focused local matrix for ROS wrapper checks.

asr:
  backend: whisper
  language: ru-RU
  timeout_sec: 35.0
  sample_rate: 16000
  chunk_ms: 800
  model: ""
  region: ""
  input_mode: file
  wav_path: data/sample/ru_privet.wav

backends:
  mock:
    deterministic_latency_ms: 25.0
  whisper:
    model_size: large-v3
    device: cuda
    compute_type: float16
    condition_on_previous_text: false
    no_speech_threshold: 0.7
    temperature: 0.0
    vad_filter: true
  vosk:
    model_path: ""
  google:
    model: latest_long
    region: global
  aws:
    region: us-east-1
    s3_bucket: ""
    media_format: wav
    cleanup: true
  azure:
    region: eastus

benchmark:
  scenarios:
    - clean
    - snr30
    - snr20
    - snr10
    - snr0
  chunk_sec: 0.8
  output_dir: results
  selected_metrics:
    - wer
    - cer
    - latency_ms
    - rtf
    - cpu_percent
    - ram_mb
    - gpu_util_percent
    - gpu_mem_mb
    - cost_estimate
    - success_rate
  pricing:
    mock: 0.0
    vosk: 0.0
    whisper: 0.0
    google: 0.006
    aws: 0.0004
    azure: 0.016

web:
  scenario_label: "Web: Latest Local Matrix (Quality)"
  scenario_description: "Quality-focused run set for whisper model-size comparison."
  interfaces:
    - core
    - ros_service
    - ros_action
  model_runs: "whisper:small,whisper:medium,whisper:large-v3"
  benchmark_backends: "whisper"
  dataset: "data/transcripts/sample_manifest.csv"
  language_mode: config
  reference_text: "privet mir"
  record_sec: 6.0
  action_chunk_sec: 0.8
  request_timeout_sec: 35.0
  noise_levels: "30,20,10,0"
